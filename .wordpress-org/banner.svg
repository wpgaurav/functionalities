<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1544 500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="50%" stop-color="#e8eef5"/>
      <stop offset="100%" stop-color="#f0f4f8"/>
    </linearGradient>

    <radialGradient id="glowCenter" cx="0.7" cy="0.5" r="0.45">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowLeft" cx="0.25" cy="0.5" r="0.35">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="bLayer1" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="bLayer2" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="bLayer3" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="bLayer4" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#a5f3fc" stop-opacity="0.35"/>
    </linearGradient>

    <linearGradient id="bEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1"/>
    </linearGradient>

    <linearGradient id="bPlatform" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="bRing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>

    <linearGradient id="bGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="bGreenL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6ee7b7" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.65"/>
    </linearGradient>
    <linearGradient id="bBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="bBlueL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.65"/>
    </linearGradient>
    <linearGradient id="bWhite" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e2e8f0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#94a3b8" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="bWhiteL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="bTeal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="bTealL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0.65"/>
    </linearGradient>

    <filter id="bShadow" x="-30%" y="-10%" width="160%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#1a365d" flood-opacity="0.12"/>
    </filter>
    <filter id="bCubeShadow" x="-40%" y="-20%" width="180%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1a365d" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Light background -->
  <rect width="1544" height="500" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.06" stroke="#94a3b8" stroke-width="0.5">
    <line x1="0" y1="100" x2="1544" y2="100"/>
    <line x1="0" y1="200" x2="1544" y2="200"/>
    <line x1="0" y1="300" x2="1544" y2="300"/>
    <line x1="0" y1="400" x2="1544" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="800" y1="0" x2="800" y2="500"/>
    <line x1="1000" y1="0" x2="1000" y2="500"/>
    <line x1="1200" y1="0" x2="1200" y2="500"/>
    <line x1="1400" y1="0" x2="1400" y2="500"/>
  </g>

  <!-- Ambient glows -->
  <rect width="1544" height="500" fill="url(#glowCenter)"/>
  <rect width="1544" height="500" fill="url(#glowLeft)"/>

  <!-- === LEFT SIDE: Text === -->
  <g transform="translate(100, 155)">
    <text font-family="'Really Sans Large', 'GTReallySans', sans-serif"
          font-size="58" font-weight="700" fill="#1e293b" letter-spacing="-1.5">
      Dynamic
    </text>
    <text y="66" font-family="'Really Sans Large', 'GTReallySans', sans-serif"
          font-size="58" font-weight="700" fill="#1e293b" letter-spacing="-1.5">
      Functionalities
    </text>

    <text y="112" font-family="'Inter', 'InterVar', sans-serif"
          font-size="20" font-weight="400" fill="#64748b" letter-spacing="0.2">
      All-in-one WordPress optimization toolkit
    </text>

    <!-- Module badges -->
    <g transform="translate(0, 142)">
      <rect width="110" height="30" rx="15" fill="#2563eb" fill-opacity="0.08" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1"/>
      <text x="55" y="20" text-anchor="middle" font-family="'Inter', 'InterVar', sans-serif"
            font-size="12" font-weight="600" fill="#2563eb">16 Modules</text>

      <rect x="120" width="90" height="30" rx="15" fill="#14b8a6" fill-opacity="0.08" stroke="#14b8a6" stroke-opacity="0.3" stroke-width="1"/>
      <text x="165" y="20" text-anchor="middle" font-family="'Inter', 'InterVar', sans-serif"
            font-size="12" font-weight="600" fill="#0d9488">Modular</text>

      <rect x="220" width="120" height="30" rx="15" fill="#10b981" fill-opacity="0.08" stroke="#10b981" stroke-opacity="0.3" stroke-width="1"/>
      <text x="280" y="20" text-anchor="middle" font-family="'Inter', 'InterVar', sans-serif"
            font-size="12" font-weight="600" fill="#059669">Zero Bloat</text>
    </g>
  </g>

  <!-- === RIGHT SIDE: Isometric illustration === -->
  <g transform="translate(950, 40)">

    <!-- Connection lines -->
    <g stroke="#14b8a6" stroke-width="2" fill="none" opacity="0.4">
      <line x1="250" y1="300" x2="120" y2="130"/>
      <line x1="310" y1="300" x2="430" y2="130"/>
      <line x1="240" y1="330" x2="100" y2="365"/>
      <line x1="320" y1="330" x2="440" y2="365"/>
      <line x1="280" y1="270" x2="280" y2="160"/>
    </g>

    <!-- Connection dots -->
    <g fill="#14b8a6">
      <circle cx="250" cy="300" r="4" opacity="0.6"/>
      <circle cx="310" cy="300" r="4" opacity="0.6"/>
      <circle cx="240" cy="330" r="4" opacity="0.6"/>
      <circle cx="320" cy="330" r="4" opacity="0.6"/>
      <circle cx="280" cy="270" r="4" opacity="0.6"/>
    </g>

    <!-- Platform -->
    <g filter="url(#bShadow)">
      <ellipse cx="280" cy="320" rx="110" ry="42" fill="url(#bPlatform)"/>
      <ellipse cx="280" cy="320" rx="110" ry="42" fill="none" stroke="url(#bRing)" stroke-width="3.5"/>
    </g>

    <!-- Glass body -->
    <g opacity="0.1">
      <rect x="200" y="200" width="160" height="100" rx="4" fill="url(#bLayer1)"/>
    </g>

    <!-- Layer 1 - bottom -->
    <g>
      <ellipse cx="280" cy="300" rx="80" ry="28" fill="url(#bLayer1)"/>
      <ellipse cx="280" cy="300" rx="80" ry="28" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.5"/>
      <ellipse cx="280" cy="297" rx="72" ry="23" fill="url(#bEdge)" opacity="0.3"/>
    </g>

    <!-- Layer 2 -->
    <g>
      <ellipse cx="280" cy="272" rx="72" ry="25" fill="url(#bLayer2)"/>
      <ellipse cx="280" cy="272" rx="72" ry="25" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.5"/>
      <ellipse cx="280" cy="269" rx="64" ry="20" fill="url(#bEdge)" opacity="0.3"/>
    </g>

    <!-- Layer 3 -->
    <g>
      <ellipse cx="280" cy="244" rx="64" ry="22" fill="url(#bLayer3)"/>
      <ellipse cx="280" cy="244" rx="64" ry="22" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.5"/>
      <ellipse cx="280" cy="241" rx="56" ry="17" fill="url(#bEdge)" opacity="0.3"/>
    </g>

    <!-- Layer 4 - top -->
    <g>
      <ellipse cx="280" cy="218" rx="56" ry="18" fill="url(#bLayer4)"/>
      <ellipse cx="280" cy="218" rx="56" ry="18" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.5"/>
      <ellipse cx="280" cy="215" rx="48" ry="13" fill="url(#bEdge)" opacity="0.4"/>
    </g>

    <!-- Top sparkle -->
    <circle cx="280" cy="205" r="8" fill="#ffffff" opacity="0.5"/>
    <circle cx="280" cy="205" r="4" fill="#ffffff" opacity="0.7"/>

    <!-- Green cube - top left -->
    <g filter="url(#bCubeShadow)" transform="translate(88, 100)">
      <path d="M32 0 L64 16 L32 32 L0 16 Z" fill="url(#bGreenL)"/>
      <path d="M0 16 L32 32 L32 60 L0 44 Z" fill="url(#bGreen)" opacity="0.8"/>
      <path d="M32 32 L64 16 L64 44 L32 60 Z" fill="#059669" opacity="0.7"/>
      <path d="M32 3 L58 16 L32 28 L6 16 Z" fill="#ffffff" opacity="0.25"/>
    </g>

    <!-- Green cube - top right -->
    <g filter="url(#bCubeShadow)" transform="translate(400, 100)">
      <path d="M32 0 L64 16 L32 32 L0 16 Z" fill="url(#bGreenL)"/>
      <path d="M0 16 L32 32 L32 60 L0 44 Z" fill="url(#bGreen)" opacity="0.8"/>
      <path d="M32 32 L64 16 L64 44 L32 60 Z" fill="#059669" opacity="0.7"/>
      <path d="M32 3 L58 16 L32 28 L6 16 Z" fill="#ffffff" opacity="0.25"/>
    </g>

    <!-- Teal cube - top center -->
    <g filter="url(#bCubeShadow)" transform="translate(254, 126)">
      <path d="M26 0 L52 13 L26 26 L0 13 Z" fill="url(#bTealL)"/>
      <path d="M0 13 L26 26 L26 50 L0 37 Z" fill="url(#bTeal)" opacity="0.8"/>
      <path d="M26 26 L52 13 L52 37 L26 50 Z" fill="#0d9488" opacity="0.7"/>
      <path d="M26 3 L47 13 L26 23 L5 13 Z" fill="#ffffff" opacity="0.25"/>
    </g>

    <!-- White cube - bottom left -->
    <g filter="url(#bCubeShadow)" transform="translate(68, 340)">
      <path d="M26 0 L52 13 L26 26 L0 13 Z" fill="url(#bWhiteL)"/>
      <path d="M0 13 L26 26 L26 48 L0 35 Z" fill="url(#bWhite)" opacity="0.9"/>
      <path d="M26 26 L52 13 L52 35 L26 48 Z" fill="#94a3b8" opacity="0.3"/>
      <path d="M26 2 L47 13 L26 23 L5 13 Z" fill="#ffffff" opacity="0.4"/>
    </g>

    <!-- Blue cube - bottom right -->
    <g filter="url(#bCubeShadow)" transform="translate(412, 338)">
      <path d="M28 0 L56 14 L28 28 L0 14 Z" fill="url(#bBlueL)"/>
      <path d="M0 14 L28 28 L28 54 L0 40 Z" fill="url(#bBlue)" opacity="0.8"/>
      <path d="M28 28 L56 14 L56 40 L28 54 Z" fill="#1d4ed8" opacity="0.7"/>
      <path d="M28 3 L50 14 L28 25 L6 14 Z" fill="#ffffff" opacity="0.25"/>
    </g>
  </g>
</svg>
